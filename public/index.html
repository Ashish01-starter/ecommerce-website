<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB Explorer</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- 🔥 FIX: defer ensures JS runs AFTER DOM loads -->
    <script defer src="app.js"></script>
</head>

<body>
<div class="app-container">

    <!-- Sidebar -->
    <aside class="sidebar glass-panel">
        <div class="sidebar-header">
            <div class="logo">
                <ion-icon name="server-outline"></ion-icon>
            </div>
            <h2>DB Explorer</h2>
        </div>

        <nav class="sidebar-nav">
            <h3>Tables</h3>

            <!-- ✅ IMPORTANT: ID must match JS -->
            <ul id="table-list">
                <li><button data-table="BUYER">BUYER</button></li>
                <li><button data-table="EMPLOYEE">EMPLOYEE</button></li>
                <li><button data-table="MANAGES">MANAGES</button></li>
                <li><button data-table="PRODUCT">PRODUCT</button></li>
                <li><button data-table="PURCHASES">PURCHASES</button></li>
                <li><button data-table="SELLER">SELLER</button></li>
                <li><button data-table="TRANSACTION">TRANSACTION</button></li>
            </ul>
        </nav>
    </aside>

    <!-- Main -->
    <main class="main-content">

        <header class="topbar glass-panel">
            <!-- ✅ MUST MATCH JS -->
            <h1 id="current-table-title">Select a Table</h1>

            <div class="topbar-actions">
                <input type="text" id="search-input" placeholder="Filter rows...">

                <button id="add-record-btn" style="display:none;">
                    Add Record
                </button>
            </div>
        </header>

        <div class="data-container glass-panel">

            <table>
                <!-- ✅ MUST MATCH JS -->
                <thead id="table-head"></thead>
                <tbody id="table-body"></tbody>
            </table>

            <div id="no-data">
                No data selected or available
            </div>

        </div>
    </main>
</div>

<!-- Modal -->
<div id="add-modal" style="display:none;">
    <div>
        <h3 id="modal-title">Add Record</h3>

        <form id="add-form">
            <div id="form-fields"></div>
            <button type="submit">Save</button>
        </form>

        <button id="close-modal">Close</button>
    </div>
</div>

</body>
</html>
